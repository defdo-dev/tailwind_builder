---
# Toolchain image build pipeline.
#
# Builds hub.defdo.ninja/defdo/tailwind-builder for linux/amd64 and
# linux/arm64 using native remote BuildKit daemons — no QEMU emulation.
# Rust/WASM compilation runs natively on each target arch.
#
# Trigger: GitHub tag push (e.g. 0.1.0)
#
# Required secrets:
#   buildkit_host_amd64   — BuildKit daemon address for linux/amd64 node
#   buildkit_host_arm64   — BuildKit daemon address for linux/arm64 node
#   docker_username       — hub.defdo.ninja login
#   docker_password       — hub.defdo.ninja password

when:
  - event: tag

steps:
  - name: build-amd64
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: hub.defdo.ninja/defdo/tailwind-builder
      registry: hub.defdo.ninja
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      dockerfile: docker/tailwind-builder-v4/Dockerfile
      platforms: linux/amd64
      tags: "${CI_COMMIT_TAG}-amd64"
      buildx_driver: remote
      buildx_driver_options:
        - "endpoint=${BUILDKIT_HOST_AMD64}"
    secrets:
      - source: buildkit_host_amd64
        target: BUILDKIT_HOST_AMD64

  - name: build-arm64
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: hub.defdo.ninja/defdo/tailwind-builder
      registry: hub.defdo.ninja
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      dockerfile: docker/tailwind-builder-v4/Dockerfile
      platforms: linux/arm64
      tags: "${CI_COMMIT_TAG}-arm64"
      buildx_driver: remote
      buildx_driver_options:
        - "endpoint=${BUILDKIT_HOST_ARM64}"
    secrets:
      - source: buildkit_host_arm64
        target: BUILDKIT_HOST_ARM64

  - name: publish-manifest
    image: woodpeckerci/plugin-docker-manifest
    settings:
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      target: "hub.defdo.ninja/defdo/tailwind-builder:${CI_COMMIT_TAG}"
      template: "hub.defdo.ninja/defdo/tailwind-builder:${CI_COMMIT_TAG}-ARCH"
      platforms:
        - linux/amd64
        - linux/arm64
    depends_on:
      - build-amd64
      - build-arm64

  - name: tag-latest
    image: woodpeckerci/plugin-docker-manifest
    settings:
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      target: "hub.defdo.ninja/defdo/tailwind-builder:latest"
      template: "hub.defdo.ninja/defdo/tailwind-builder:${CI_COMMIT_TAG}-ARCH"
      platforms:
        - linux/amd64
        - linux/arm64
    depends_on:
      - publish-manifest
