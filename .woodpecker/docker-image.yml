---
# Toolchain (base) image build pipeline.
#
# Builds hub.defdo.ninja/defdo/tailwind-builder for linux/amd64 and linux/arm64
# by driving the in-cluster native BuildKit daemons DIRECTLY with `buildctl` —
# no docker-in-docker, no QEMU. The old `woodpeckerci/plugin-docker-buildx` step
# boots a local dockerd even in remote mode, and that dind fails to start its
# overlay2 storage on the k3s/containerd nodes (overlayfs "invalid argument"),
# which broke every base build. buildctl talks to the remote buildkitd over
# plain TCP (:1234); the daemon runs on a native amd64/arm64 node — so OTP's
# prim_tty NIF does not crash the way it does under QEMU emulation on an arm64
# host building amd64.
#
# KNOWN BLOCKER (operator fix required): the base has a ~614MB rust layer, and
# buildkit resolves hub.defdo.ninja to Cloudflare (it ignores hostAliases), which
# rejects >~100MB bodies with 413. Pushing to the internal Harbor IP instead
# fails TLS ("no IP SANs" — Harbor's cert is legacy-CN) and buildkit does NOT
# honor `insecure` for Harbor's token endpoint. So this pipeline 413s until the
# OPERATOR does ONE of: (a) a CoreDNS rewrite so in-cluster pods resolve
# hub.defdo.ninja to the internal Harbor ClusterIP (cert CN matches, no CF —
# fixes ALL image builds), or (b) regenerate Harbor's cert WITH SANs. Meanwhile
# the base is rarely needed (toolchain-only) and can be built via the manual
# docker flow (docker load on a node → internal push, docker honors /etc/hosts).
# The multi-arch index is assembled with manifest-tool (no docker daemon).
#
# The base is self-contained (installs the toolchain: OTP/Elixir/node/pnpm/rust/
# bun), so the build context is just this repo.
#
# Trigger: a tag push that ACTUALLY changes the toolchain (this Dockerfile or
# this pipeline). Plain code tags (0.2.x = Elixir changes) do NOT rebuild the
# 614MB base — the worker image builds FROM the existing base:latest. Rebuilding
# it on every tag was ~30min of wasted native BuildKit time per release.
# Required secrets: docker_username, docker_password

when:
  - event: tag
    path:
      include:
        - "docker/tailwind-builder-v4/**"
        - ".woodpecker/docker-image.yml"

labels:
  platform: linux/amd64

steps:
  - name: build-amd64
    image: moby/buildkit:v0.16.0
    environment:
      DOCKER_USERNAME:
        from_secret: docker_username
      DOCKER_PASSWORD:
        from_secret: docker_password
    commands:
      - export DOCKER_CONFIG=/tmp/dockercfg && mkdir -p $DOCKER_CONFIG
      - 'printf ''{"auths":{"hub.defdo.ninja":{"auth":"%s"}}}'' "$(printf "%s:%s" "$DOCKER_USERNAME" "$DOCKER_PASSWORD" | base64 -w0)" > $DOCKER_CONFIG/config.json'
      - |
        buildctl --addr tcp://buildkit-amd64.defdo-ci.svc.cluster.local:1234 build \
          --frontend dockerfile.v0 \
          --local context=. \
          --local dockerfile=docker/tailwind-builder-v4 \
          --opt filename=Dockerfile \
          --output type=image,name=hub.defdo.ninja/defdo/tailwind-builder:${CI_COMMIT_TAG}-amd64,push=true

  - name: build-arm64
    image: moby/buildkit:v0.16.0
    environment:
      DOCKER_USERNAME:
        from_secret: docker_username
      DOCKER_PASSWORD:
        from_secret: docker_password
    commands:
      - export DOCKER_CONFIG=/tmp/dockercfg && mkdir -p $DOCKER_CONFIG
      - 'printf ''{"auths":{"hub.defdo.ninja":{"auth":"%s"}}}'' "$(printf "%s:%s" "$DOCKER_USERNAME" "$DOCKER_PASSWORD" | base64 -w0)" > $DOCKER_CONFIG/config.json'
      - |
        buildctl --addr tcp://buildkit-arm64.defdo-ci.svc.cluster.local:1234 build \
          --frontend dockerfile.v0 \
          --local context=. \
          --local dockerfile=docker/tailwind-builder-v4 \
          --opt filename=Dockerfile \
          --output type=image,name=hub.defdo.ninja/defdo/tailwind-builder:${CI_COMMIT_TAG}-arm64,push=true

  - name: manifest
    image: mplatform/manifest-tool:alpine
    environment:
      DOCKER_USERNAME:
        from_secret: docker_username
      DOCKER_PASSWORD:
        from_secret: docker_password
    commands:
      - |
        for TAG in "${CI_COMMIT_TAG}" latest; do
          manifest-tool --username "$DOCKER_USERNAME" --password "$DOCKER_PASSWORD" --insecure \
            push from-args \
            --platforms linux/amd64,linux/arm64 \
            --template hub.defdo.ninja/defdo/tailwind-builder:${CI_COMMIT_TAG}-ARCH \
            --target hub.defdo.ninja/defdo/tailwind-builder:$TAG
        done
    depends_on:
      - build-amd64
      - build-arm64
