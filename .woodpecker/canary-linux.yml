---
# Canary Linux release pipeline.
#
# Runs the v4.2.2-rc1 Tailwind + DaisyUI release flow inside the toolchain
# container image, targeting the linux-x64 canary prefix on R2.
#
# Trigger:
#   - push to canary/* branches
#   - manual dispatch
#
# Required Woodpecker secrets (set once in project settings):
#   r2_access_key_id       — Cloudflare R2 access key
#   r2_secret_access_key   — Cloudflare R2 secret key
#   r2_host                — R2 endpoint, e.g. <acct>.r2.cloudflarestorage.com
#   r2_region              — R2 region (usually "auto")
#
# Outputs:
#   Published artifact: https://storage.defdo.de/tailwind_cli_daisyui_ci_canary/v4.2.2-rc1-linux-canary/tailwindcss-linux-x64
#   Published manifest: https://storage.defdo.de/tailwind_cli_daisyui_ci_canary/v4.2.2-rc1-linux-canary/manifest.json
#
# Limitations:
#   This pipeline only proves linux-x64 (the agent's native target).
#   macOS and Windows targets require native hosts outside this pipeline.

labels:
  platform: linux/amd64

when:
  - event: push
    branch:
      - canary/*
  - event: manual

steps:
  - name: test
    image: hub.defdo.ninja/defdo/tailwind-builder:latest
    commands:
      - mix deps.get
      - mix test

  - name: release-canary-linux
    image: hub.defdo.ninja/defdo/tailwind-builder:latest
    environment:
      R2_ACCESS_KEY_ID:
        from_secret: r2_access_key_id
      R2_SECRET_ACCESS_KEY:
        from_secret: r2_secret_access_key
      R2_HOST:
        from_secret: r2_host
      R2_REGION:
        from_secret: r2_region
    commands:
      - mix deps.get
      - >-
        mix tailwind.release
        --version 4.2.2
        --channel v4.2.2-rc1-linux-canary
        --config-provider testing
        --bucket defdo
        --prefix tailwind_cli_daisyui_ci_canary
        --storage-base-url https://storage.defdo.de
        --plugin daisyui_v5
        --smoke-test
        --verify-upload
        --verify-smoke-test
        --overwrite-policy fail
