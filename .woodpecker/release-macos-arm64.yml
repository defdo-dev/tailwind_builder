---
# macOS arm64 release pipeline.
#
# Runs natively on the macOS arm64 exec agent — no Linux container.
# The mix task compiles the Tailwind v4 standalone via bun (cross-compiles
# all platforms), but smoke test runs only the native tailwindcss-macos-arm64
# binary, which is what makes this step necessary.
#
# Trigger:
#   - push to canary/* branches
#   - manual dispatch
#
# Runner requirement:
#   Woodpecker exec agent on darwin/arm64 with toolchain installed:
#     Elixir, Node 22+, pnpm 9+, Rust 1.90+ (wasm32-wasip1-threads), Bun 1.2+
#
# Required secrets (same as canary-linux.yml):
#   r2_access_key_id       — Cloudflare R2 access key
#   r2_secret_access_key   — Cloudflare R2 secret key
#   r2_host                — R2 endpoint, e.g. <acct>.r2.cloudflarestorage.com
#   r2_region              — R2 region (usually "auto")
#
# Outputs:
#   Published artifact: https://storage.defdo.de/tailwind_cli_daisyui_ci_canary/v4.2.2-rc1-macos-canary/tailwindcss-macos-arm64
#   Published manifest: https://storage.defdo.de/tailwind_cli_daisyui_ci_canary/v4.2.2-rc1-macos-canary/manifest.json

labels:
  platform: darwin/arm64

when:
  - event: push
    branch:
      - canary/*
  - event: manual

steps:
  - name: test
    commands:
      - mix deps.get
      - mix test

  - name: release-macos-arm64
    environment:
      R2_ACCESS_KEY_ID:
        from_secret: r2_access_key_id
      R2_SECRET_ACCESS_KEY:
        from_secret: r2_secret_access_key
      R2_HOST:
        from_secret: r2_host
      R2_REGION:
        from_secret: r2_region
    commands:
      - mix deps.get
      - >-
        mix tailwind.release
        --version 4.2.2
        --channel v4.2.2-rc1-macos-canary
        --config-provider testing
        --bucket defdo
        --prefix tailwind_cli_daisyui_ci_canary
        --storage-base-url https://storage.defdo.de
        --plugin daisyui_v5
        --smoke-test
        --verify-upload
        --verify-smoke-test
        --overwrite-policy fail
