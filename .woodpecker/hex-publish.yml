---
# Hex publish pipeline — publishes the tailwind_builder ELIXIR LIBRARY to the
# private `defdo` Hex organization on tag push.
#
# This is distinct from the release-*/canary pipelines, which build the Tailwind
# CLI + DaisyUI standalone BINARIES and upload them to R2. This one publishes the
# mix package so consumers can depend on it via Hex instead of a local path.
#
# Secrets (global Woodpecker secrets, available on `tag` events):
#   hex_api_key    — Hex user API key with publish rights on the defdo org
#   hex_org_token  — Hex org read/auth key for the private `defdo` repo
#
# Trigger: pushing a version tag (e.g. `0.2.17`). The version comes from the
# VERSION file via mix.exs, so the tag must match it.
#
# Pinned to the darwin/arm64 exec agent (mac-mini-builder) — the local backend
# host that has the Elixir/Mix toolchain in PATH, same as release-macos-arm64.yml.
# Without this label the tag event can land on an agent without `mix`.

labels:
  platform: darwin/arm64

when:
  - event: tag

# Woodpecker LOCAL backend: `image:` names the SHELL used to run `commands`
# (bash), NOT a container — same convention as the release pipelines (see
# release-macos-arm64.yml). The exec agent host already provides the toolchain
# (Elixir/OTP/Mix) in PATH, and publishing needs only mix + hex.
#
# Passing a container image name here (e.g. `tailwind-builder:latest` or
# `elixir:1.19`) makes the local backend try to exec the image string as a host
# binary and fails with `exec: "<image>": executable file not found` /
# `no such file`. That is what broke the earlier code-tag publishes.
steps:
  - name: validate
    image: bash
    environment:
      HEX_API_KEY:
        from_secret: hex_api_key
      HEX_ORG_TOKEN:
        from_secret: hex_org_token
    commands:
      - |
        set -e
        HEX_ORG_NAME="defdo"
        mix local.hex --force
        if [ -n "$HEX_ORG_TOKEN" ]; then
          mix hex.organization auth "$HEX_ORG_NAME" --key "$HEX_ORG_TOKEN"
        fi
        mix deps.get
        mix compile --warnings-as-errors
        mix hex.build

  - name: hex-publish
    image: bash
    depends_on: [validate]
    environment:
      HEX_API_KEY:
        from_secret: hex_api_key
      HEX_ORG_TOKEN:
        from_secret: hex_org_token
    commands:
      - |
        set -e
        HEX_ORG_NAME="defdo"
        if [ -z "$HEX_API_KEY" ]; then
          echo "ERROR: HEX_API_KEY is required to publish"
          exit 1
        fi
        mix local.hex --force
        if [ -n "$HEX_ORG_TOKEN" ]; then
          mix hex.organization auth "$HEX_ORG_NAME" --key "$HEX_ORG_TOKEN"
        fi
        mix deps.get
        mix hex.publish --yes
