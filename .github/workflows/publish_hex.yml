name: Hex.pm

on: push

jobs:
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        otp: ['28.3']
        elixir: ['1.19.5']
    steps:
    - uses: actions/checkout@v3
    - uses: erlef/setup-beam@v1
      with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}
    - uses: actions/cache@v4
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-
    - name: Install Dependencies
      shell: bash
      run: |
            sudo apt-get update
            sudo apt-get -qq -y install curl make build-essential git
            [[ ! -z "${{ vars.HEX_ORG_NAME }}" && ! -z "${{ secrets.HEX_ORG_TOKEN }}" ]] && mix hex.organization auth ${{ vars.HEX_ORG_NAME }} --key ${{ secrets.HEX_ORG_TOKEN }} || echo "no hex org configured"
            mix deps.get
    - name: Publish to Hex
      env:
        HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
      run: mix hex.publish --yes
    - name: Discord notification
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      uses: Ilshidur/action-discord@0.3.2
      with:
        args: 'A new tag of the project {{ EVENT_PAYLOAD.repository.full_name }} has been published.'
